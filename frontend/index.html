<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ניהול טיול שנתי</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .section { border: 1px solid black; padding: 10px; margin-bottom: 10px; }
    #map { height: 400px; width: 100%; margin-top: 20px; border: 2px solid #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid black; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>מערכת ניהול טיול שנתי</h1>

  <div class="section">
    <h3>רישום (תלמידה/מורה)</h3>
    שם: <input type="text" id="reg_name"> 
    ת"ז: <input type="text" id="reg_id"> 
    כיתה: <input type="text" id="reg_class">
    <button onclick="register('students')">רשמי תלמידה</button>
    <button onclick="register('teachers')">רשמי מורה</button>
  </div>

  <div class="section">
    <h3>אזור מורה - חיפוש ושליפה</h3>
    
    <strong>1. אימות מורה:</strong> 
    <input type="text" id="auth_id" placeholder="תז מורה מאמתת">
    <hr>

    <strong>2. אפשרויות חיפוש:</strong><br><br>
    
    חפשי תלמידה (ת"ז): <input type="text" id="search_student_id">
    <button onclick="fetchData('student_spec')">חיפוש תלמידה</button>
    <br><br>

    חפשי מורה (ת"ז): <input type="text" id="search_teacher_id">
    <button onclick="fetchData('teacher_spec')">חיפוש מורה</button>
    <br><br>

    <button onclick="fetchData('my_class')">הצגת התלמידות בכיתה שלי</button>
    <button onclick="fetchData('all')">הצגת כל המאגר</button>

    <p id="status_msg"></p>

    <table border="1" id="res_table" style="display:none; margin-top: 10px;">
      <thead>
        <tr>
          <th>שם</th>
          <th>ת"ז</th>
          <th>כיתה</th>
        </tr>
      </thead>
      <tbody id="res_body"></tbody>
    </table>
  </div>

  <div class="section">
    <h3>מערכת איכון תלמידות - מפה</h3>
    <div>
        <h3>מעקב מרחק מורה</h3>
        הזיני ת"ז מורה: <input type="text" id="teacher_id_input" placeholder="למשל 123456">
        <button onclick="updateMap()">עדכן מיקומים והתראות</button>
    </div>
        <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const API_URL = "http://127.0.0.1:8000";

    async function register(type) {
      const nameVal = document.getElementById('reg_name').value;
      const idVal = document.getElementById('reg_id').value;
      const classVal = document.getElementById('reg_class').value;

      const payload = {
        full_name: nameVal,
        identity_number: idVal,
        class_name: classVal
      };

      try {
        const r = await fetch(`${API_URL}/${type}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          alert("שגיאה: " + (data.detail || "נתונים לא תקינים"));
        } else {
          alert("נרשם בהצלחה!");
          document.getElementById('reg_name').value = "";
          document.getElementById('reg_id').value = "";
          document.getElementById('reg_class').value = "";
        }
      } catch (e) {
        alert("שגיאה בחיבור לשרת");
      }
    }

    async function fetchData(mode) {
      const authId = document.getElementById('auth_id').value;
      const studentId = document.getElementById('search_student_id').value;
      const teacherId = document.getElementById('search_teacher_id').value;
      const table = document.getElementById('res_table');
      const tbody = document.getElementById('res_body');
      const msg = document.getElementById('status_msg');

      if (!authId) { alert("חובה להזין תז מורה לאימות!"); return; }

      try {
        let results = [];

        if (mode === 'all') {
          const resStudents = await fetch(`${API_URL}/students/?teacher_identity_number=${authId}`);
          const resTeachers = await fetch(`${API_URL}/teachers/?teacher_identity_number=${authId}`);
          if (!resStudents.ok || !resTeachers.ok) throw new Error("שגיאה בשליפה. ודאי שאת מורה מורשית.");
          results = [...await resTeachers.json(), ...await resStudents.json()];
        } 
        else if (mode === 'student_spec') {
          const r = await fetch(`${API_URL}/students/${studentId}?teacher_identity_number=${authId}`);
          const data = await r.json();
          if (!r.ok) throw new Error(data.detail);
          results = [data];
        } 
        else if (mode === 'teacher_spec') {
          const r = await fetch(`${API_URL}/teachers/${teacherId}?teacher_identity_number=${authId}`);
          const data = await r.json();
          if (!r.ok) throw new Error(data.detail);
          results = [data];
        } 
        else if (mode === 'my_class') {
          const r = await fetch(`${API_URL}/teachers/by-identity/${authId}/students?teacher_identity_number=${authId}`);
          const data = await r.json();
          if (!r.ok) throw new Error(data.detail);
          results = data;
        }

        tbody.innerHTML = "";
        results.forEach(item => {
          tbody.innerHTML += `<tr><td>${item.full_name}</td><td>${item.identity_number}</td><td>${item.class_name}</td></tr>`;
        });
        table.style.display = "table";
        msg.innerText = "נמצאו " + results.length + " רשומות.";

      } catch (e) {
        msg.innerText = "שגיאה: " + e.message;
        table.style.display = "none";
      }
    }


    // אתחול המפה
    let map = L.map('map').setView([32.0853, 34.7818], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let markers = {};


 async function updateMap() {
    const teacherId = document.getElementById('teacher_id_input').value;

    try {
      
        const response = await fetch(`${API_URL}/locations/latest`);
        const locations = await response.json();

        locations.forEach(loc => {
            const pos = [loc.latitude, loc.longitude];
            
            if (markers[loc.student_id]) {
                markers[loc.student_id].setLatLng(pos);
            } else {
                markers[loc.student_id] = L.marker(pos).addTo(map).bindPopup(`מזהה: ${loc.student_id}`);
            }
            
            markers[loc.student_id]._icon.style.filter = "none";
        });

        if (teacherId) {
            const alertRes = await fetch(`${API_URL}/teachers/${teacherId}/alerts`);
            const alertData = await alertRes.json();

            if (alertData.alerts && alertData.alerts.length > 0) {
                alertData.alerts.forEach(alert => {
                    if (markers[alert.student_id]) {
                        // צביעת המרקר באדום באמצעות פילטר 
                        markers[alert.student_id]._icon.style.filter = "hue-rotate(120deg) saturate(3) brightness(0.8)";
                        
                        markers[alert.student_id].bindPopup(
                            `<b style="color:red;">חריגת מרחק!</b><br>` +
                            `שם: ${alert.student_name}<br>` +
                            `מרחק מהמורה: ${alert.distance} ק"מ`
                        ).openPopup();
                    }
                });
            }
        }
    } catch (err) {
        console.error("שגיאה בעדכון המפה:", err);
    }
}

    // עדכון כל 60 שניות לפי דרישת המטלה 
    updateMap();
    setInterval(updateMap, 60000);

  </script>
</body>
</html>
